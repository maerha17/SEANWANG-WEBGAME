<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>2048</title>
  <style>
    :root {
      --bg: #faf8ef;
      --ink: #776e65;
      --muted: #9a8f83;
      --board: #bbada0;
      --empty: rgba(238, 228, 218, 0.35);
      --button: #8f7a66;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
    }

    .app {
      width: min(100%, 520px);
      padding: 18px 16px 28px;
    }

    .nav {
      display: inline-flex;
      align-items: center;
      height: 36px;
      margin-bottom: 10px;
      color: var(--ink);
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
    }

    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(52px, 16vw, 78px);
      line-height: 0.9;
      letter-spacing: 0;
    }

    .scores {
      display: flex;
      gap: 8px;
    }

    .score {
      min-width: 82px;
      border-radius: 6px;
      padding: 8px 10px;
      color: #fff;
      background: #bbada0;
      text-align: center;
    }

    .score span {
      display: block;
      color: #eee4da;
      font-size: 12px;
      line-height: 16px;
      font-weight: 800;
    }

    .score strong {
      display: block;
      font-size: 24px;
      line-height: 28px;
    }

    .intro {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .intro p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 22px;
    }

    button {
      border: 0;
      border-radius: 6px;
      color: #fff;
      background: var(--button);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      touch-action: manipulation;
    }

    #newGame {
      width: 112px;
      height: 42px;
      flex: 0 0 auto;
    }

    .board-wrap {
      position: relative;
      width: min(calc(100vw - 32px), 488px);
      aspect-ratio: 1;
      margin: 0 auto;
    }

    .board {
      position: relative;
      width: 100%;
      height: 100%;
      padding: clamp(8px, 2.6vw, 14px);
      border-radius: 8px;
      background: var(--board);
      touch-action: none;
      user-select: none;
    }

    .grid-cell,
    .tile {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
    }

    .grid-cell {
      background: var(--empty);
    }

    .tile {
      color: #776e65;
      font-size: clamp(30px, 10vw, 56px);
      font-weight: 900;
      line-height: 1;
      z-index: 2;
      transition: transform 130ms ease-in-out;
      will-change: transform;
    }

    .tile.new {
      animation: pop-in 130ms ease-out;
    }

    .tile.merged {
      animation: merge-pop 150ms ease-out 130ms;
    }

    .tile.v2 { background: #eee4da; }
    .tile.v4 { background: #ede0c8; }
    .tile.v8 { color: #f9f6f2; background: #f2b179; }
    .tile.v16 { color: #f9f6f2; background: #f59563; }
    .tile.v32 { color: #f9f6f2; background: #f67c5f; }
    .tile.v64 { color: #f9f6f2; background: #f65e3b; }
    .tile.v128 { color: #f9f6f2; background: #edcf72; font-size: clamp(26px, 8vw, 46px); }
    .tile.v256 { color: #f9f6f2; background: #edcc61; font-size: clamp(26px, 8vw, 46px); }
    .tile.v512 { color: #f9f6f2; background: #edc850; font-size: clamp(26px, 8vw, 46px); }
    .tile.v1024 { color: #f9f6f2; background: #edc53f; font-size: clamp(22px, 7vw, 38px); }
    .tile.v2048 { color: #f9f6f2; background: #edc22e; font-size: clamp(22px, 7vw, 38px); }
    .tile.super { color: #f9f6f2; background: #3c3a32; font-size: clamp(20px, 6vw, 34px); }

    @keyframes pop-in {
      0% {
        opacity: 0;
        transform: scale(0.4);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes merge-pop {
      0% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.14);
      }
      100% {
        transform: scale(1);
      }
    }

    .overlay {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: none;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      background: rgba(250, 248, 239, 0.78);
      text-align: center;
    }

    .overlay.show {
      display: flex;
    }

    .overlay h2 {
      margin: 0 0 14px;
      font-size: 34px;
      line-height: 42px;
    }

    .overlay-actions {
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    .overlay button {
      min-width: 92px;
      height: 40px;
      padding: 0 14px;
    }

    .help {
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 22px;
    }

    @media (max-width: 420px) {
      .app {
        padding-inline: 12px;
      }

      header {
        display: block;
      }

      .scores {
        margin-top: 12px;
      }

      .intro {
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <a class="nav" href="../../">返回游戏列表</a>
    <header>
      <h1>2048</h1>
      <section class="scores" aria-label="分数">
        <div class="score">
          <span>分数</span>
          <strong id="score">0</strong>
        </div>
        <div class="score">
          <span>最高</span>
          <strong id="best">0</strong>
        </div>
      </section>
    </header>

    <section class="intro">
      <p>合并相同数字，冲到 2048。电脑用方向键，手机直接滑动。</p>
      <button type="button" id="newGame">新游戏</button>
    </section>

    <section class="board-wrap">
      <div class="board" id="board" aria-label="2048 棋盘"></div>
      <div class="overlay" id="overlay">
        <div>
          <h2 id="overlayTitle"></h2>
          <div class="overlay-actions">
            <button type="button" id="tryAgain">再来</button>
            <button type="button" id="keepGoing">继续</button>
          </div>
        </div>
      </div>
    </section>

    <p class="help">提示：到 2048 后可以继续挑战更高数字。当前进度会自动保存在这个浏览器里。</p>
  </main>

  <script>
    const SIZE = 4
    const STORAGE_KEY = 'seanwang.2048.state.v1'
    const BEST_KEY = 'seanwang.2048.best.v1'

    const state = {
      grid: createEmptyGrid(),
      score: 0,
      best: Number(localStorage.getItem(BEST_KEY) || 0),
      won: false,
      over: false,
      keepPlaying: false
    }

    const boardElement = document.querySelector('#board')
    const scoreElement = document.querySelector('#score')
    const bestElement = document.querySelector('#best')
    const overlayElement = document.querySelector('#overlay')
    const overlayTitleElement = document.querySelector('#overlayTitle')
    const keepGoingButton = document.querySelector('#keepGoing')
    let lastNewTile = null
    let touchStart = null

    function createEmptyGrid() {
      return Array.from({ length: SIZE }, () => Array(SIZE).fill(0))
    }

    function cloneGrid(grid) {
      return grid.map((row) => row.slice())
    }

    function emptyCells() {
      const cells = []
      for (let row = 0; row < SIZE; row += 1) {
        for (let col = 0; col < SIZE; col += 1) {
          if (state.grid[row][col] === 0) {
            cells.push({ row, col })
          }
        }
      }
      return cells
    }

    function addRandomTile() {
      const cells = emptyCells()
      if (!cells.length) {
        return null
      }

      const cell = cells[Math.floor(Math.random() * cells.length)]
      state.grid[cell.row][cell.col] = Math.random() < 0.9 ? 2 : 4
      return cell
    }

    function resetGame() {
      state.grid = createEmptyGrid()
      state.score = 0
      state.won = false
      state.over = false
      state.keepPlaying = false
      addRandomTile()
      lastNewTile = addRandomTile()
      saveGame()
      render()
    }

    function saveGame() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        grid: state.grid,
        score: state.score,
        won: state.won,
        over: state.over,
        keepPlaying: state.keepPlaying
      }))
      localStorage.setItem(BEST_KEY, String(state.best))
    }

    function loadGame() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY))
        if (!saved || !Array.isArray(saved.grid)) {
          return false
        }

        state.grid = saved.grid
        state.score = saved.score || 0
        state.won = Boolean(saved.won)
        state.over = Boolean(saved.over)
        state.keepPlaying = Boolean(saved.keepPlaying)
        return true
      } catch (error) {
        return false
      }
    }

    function processLine(line) {
      const numbers = line.filter(Boolean)
      const result = []
      let gained = 0

      for (let i = 0; i < numbers.length; i += 1) {
        if (numbers[i] === numbers[i + 1]) {
          const merged = numbers[i] * 2
          result.push(merged)
          gained += merged
          i += 1
        } else {
          result.push(numbers[i])
        }
      }

      while (result.length < SIZE) {
        result.push(0)
      }

      return { line: result, gained }
    }

    function traversalFor(index, direction) {
      if (direction === 'left') {
        return Array.from({ length: SIZE }, (_, col) => ({ row: index, col }))
      }
      if (direction === 'right') {
        return Array.from({ length: SIZE }, (_, col) => ({ row: index, col: SIZE - 1 - col }))
      }
      if (direction === 'up') {
        return Array.from({ length: SIZE }, (_, row) => ({ row, col: index }))
      }
      return Array.from({ length: SIZE }, (_, row) => ({ row: SIZE - 1 - row, col: index }))
    }

    function slideLine(entries, direction, index, next) {
      const tiles = entries.filter((entry) => entry.value)
      const animations = []
      let gained = 0
      let target = 0

      for (let i = 0; i < tiles.length; i += 1) {
        let value = tiles[i].value
        let sources = [tiles[i]]
        let merged = false

        if (tiles[i + 1] && tiles[i + 1].value === value) {
          value *= 2
          gained += value
          sources = [tiles[i], tiles[i + 1]]
          merged = true
          i += 1
        }

        let destination
        if (direction === 'left') {
          destination = { row: index, col: target }
        } else if (direction === 'right') {
          destination = { row: index, col: SIZE - 1 - target }
        } else if (direction === 'up') {
          destination = { row: target, col: index }
        } else {
          destination = { row: SIZE - 1 - target, col: index }
        }

        next[destination.row][destination.col] = value
        const source = chooseAnimationSource(sources, destination)
        animations.push({
          fromRow: source.row,
          fromCol: source.col,
          toRow: destination.row,
          toCol: destination.col,
          merged
        })
        target += 1
      }

      return { gained, animations }
    }

    function chooseAnimationSource(sources, destination) {
      return sources.reduce((best, source) => {
        const bestDistance = Math.abs(best.row - destination.row) + Math.abs(best.col - destination.col)
        const sourceDistance = Math.abs(source.row - destination.row) + Math.abs(source.col - destination.col)
        return sourceDistance > bestDistance ? source : best
      }, sources[0])
    }

    function move(direction) {
      if (state.over || (state.won && !state.keepPlaying)) {
        return
      }

      const before = JSON.stringify(state.grid)
      const next = createEmptyGrid()
      let gained = 0
      let animations = []

      for (let i = 0; i < SIZE; i += 1) {
        const entries = traversalFor(i, direction).map(({ row, col }) => ({
          row,
          col,
          value: state.grid[row][col]
        }))
        const result = slideLine(entries, direction, i, next)
        gained += result.gained
        animations = animations.concat(result.animations)
      }

      if (JSON.stringify(next) === before) {
        return
      }

      state.grid = next
      state.score += gained
      state.best = Math.max(state.best, state.score)
      lastNewTile = addRandomTile()
      updateStatus()
      saveGame()
      render(animations)
    }

    function updateStatus() {
      if (!state.won && state.grid.flat().includes(2048)) {
        state.won = true
      }

      state.over = !canMove()
    }

    function canMove() {
      if (emptyCells().length) {
        return true
      }

      for (let row = 0; row < SIZE; row += 1) {
        for (let col = 0; col < SIZE; col += 1) {
          const value = state.grid[row][col]
          if (state.grid[row][col + 1] === value || (state.grid[row + 1] && state.grid[row + 1][col] === value)) {
            return true
          }
        }
      }

      return false
    }

    function getBoardGeometry() {
      const size = boardElement.clientWidth
      const styles = getComputedStyle(boardElement)
      const padding = parseFloat(styles.paddingLeft)
      const gap = Math.max(8, Math.min(14, window.innerWidth * 0.026))
      const cell = (size - padding * 2 - gap * (SIZE - 1)) / SIZE
      return { padding, gap, cell }
    }

    function cellPosition(row, col, geometry) {
      return {
        x: geometry.padding + col * (geometry.cell + geometry.gap),
        y: geometry.padding + row * (geometry.cell + geometry.gap)
      }
    }

    function render(animations) {
      const animationMap = new Map()
      ;(animations || []).forEach((animation) => {
        animationMap.set(`${animation.toRow}:${animation.toCol}`, animation)
      })

      boardElement.innerHTML = ''
      const geometry = getBoardGeometry()

      for (let row = 0; row < SIZE; row += 1) {
        for (let col = 0; col < SIZE; col += 1) {
          const position = cellPosition(row, col, geometry)
          const cell = document.createElement('div')
          cell.className = 'grid-cell'
          cell.style.left = `${position.x}px`
          cell.style.top = `${position.y}px`
          cell.style.width = `${geometry.cell}px`
          cell.style.height = `${geometry.cell}px`
          boardElement.appendChild(cell)
        }
      }

      state.grid.forEach((rowValues, row) => {
        rowValues.forEach((value, col) => {
          if (!value) {
            return
          }

          const position = cellPosition(row, col, geometry)
          const animation = animationMap.get(`${row}:${col}`)
        const tile = document.createElement('div')
        tile.className = value ? `tile v${value}` : 'tile'
        if (value > 2048) {
          tile.className = 'tile super'
        }
          if (lastNewTile && lastNewTile.row === row && lastNewTile.col === col && !animation) {
            tile.classList.add('new')
          }
          if (animation && animation.merged) {
            tile.classList.add('merged')
          }
          tile.style.left = `${position.x}px`
          tile.style.top = `${position.y}px`
          tile.style.width = `${geometry.cell}px`
          tile.style.height = `${geometry.cell}px`

          if (animation) {
            const from = cellPosition(animation.fromRow, animation.fromCol, geometry)
            tile.style.transition = 'none'
            tile.style.transform = `translate(${from.x - position.x}px, ${from.y - position.y}px)`
            requestAnimationFrame(() => {
              requestAnimationFrame(() => {
                tile.style.transition = ''
                tile.style.transform = 'translate(0, 0)'
              })
            })
          }

        tile.textContent = value ? String(value) : ''
        boardElement.appendChild(tile)
      })
      })

      lastNewTile = null

      scoreElement.textContent = String(state.score)
      bestElement.textContent = String(state.best)

      const showWin = state.won && !state.keepPlaying
      overlayElement.classList.toggle('show', showWin || state.over)
      overlayTitleElement.textContent = state.over ? '游戏结束' : '到 2048 了'
      keepGoingButton.style.display = showWin ? 'inline-block' : 'none'
    }

    document.querySelector('#newGame').addEventListener('click', resetGame)
    document.querySelector('#tryAgain').addEventListener('click', resetGame)
    keepGoingButton.addEventListener('click', () => {
      state.keepPlaying = true
      saveGame()
      render()
    })

    window.addEventListener('keydown', (event) => {
      const keys = {
        ArrowLeft: 'left',
        ArrowRight: 'right',
        ArrowUp: 'up',
        ArrowDown: 'down'
      }

      if (keys[event.key]) {
        event.preventDefault()
        move(keys[event.key])
      }
    })

    boardElement.addEventListener('touchstart', (event) => {
      const touch = event.changedTouches[0]
      touchStart = { x: touch.clientX, y: touch.clientY }
    }, { passive: true })

    boardElement.addEventListener('touchend', (event) => {
      if (!touchStart) {
        return
      }

      const touch = event.changedTouches[0]
      const dx = touch.clientX - touchStart.x
      const dy = touch.clientY - touchStart.y
      touchStart = null

      if (Math.max(Math.abs(dx), Math.abs(dy)) < 24) {
        return
      }

      if (Math.abs(dx) > Math.abs(dy)) {
        move(dx > 0 ? 'right' : 'left')
      } else {
        move(dy > 0 ? 'down' : 'up')
      }
    }, { passive: true })

    if (!loadGame()) {
      resetGame()
    } else {
      updateStatus()
      render()
    }
  </script>
</body>
</html>
