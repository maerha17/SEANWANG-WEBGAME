<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>掉下去</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #171b25;
      color: #fff6db;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      touch-action: none;
      user-select: none;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    .back {
      position: fixed;
      left: 12px;
      top: 12px;
      z-index: 2;
      display: inline-flex;
      align-items: center;
      height: 34px;
      padding: 0 12px;
      border-radius: 6px;
      color: #11151b;
      background: rgba(255, 248, 226, 0.9);
      font-size: 14px;
      font-weight: 800;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <a class="back" href="../../">返回</a>
  <canvas id="game" aria-label="掉下去游戏"></canvas>

  <script>
    const canvas = document.querySelector('#game')
    const ctx = canvas.getContext('2d')

    const state = {
      width: 0,
      height: 0,
      dpr: 1,
      score: 0,
      lastTime: performance.now(),
      balls: [],
      targets: [],
      particles: [],
      flashes: [],
      beltOffset: 0,
      fireCooldown: 0
    }

    const POINTS = 10
    const TARGET_RESET_MS = 1200
    const BALL_SPEED = 860
    const BELT_SPEED = 72
    const TARGETS = [
      { slot: 0, row: 0, hue: 0 },
      { slot: 1, row: 0, hue: 1 },
      { slot: 2, row: 0, hue: 2 },
      { slot: 3, row: 0, hue: 3 },
      { slot: 0, row: 1, hue: 4 },
      { slot: 1, row: 1, hue: 0 },
      { slot: 2, row: 1, hue: 1 },
      { slot: 3, row: 1, hue: 2 }
    ]

    function resize() {
      state.dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1))
      state.width = window.innerWidth
      state.height = window.innerHeight
      canvas.width = Math.floor(state.width * state.dpr)
      canvas.height = Math.floor(state.height * state.dpr)
      ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0)
      layoutTargets()
    }

    function layout() {
      const safeTop = 54
      const maxW = Math.min(state.width - 18, state.height * 0.58)
      const machineW = Math.max(310, maxW)
      const machineH = state.height - safeTop - 10
      const x = (state.width - machineW) / 2
      const y = safeTop
      const headerH = machineH * 0.24
      const targetH = machineH * 0.31
      const controlH = machineH - headerH - targetH
      return {
        x,
        y,
        w: machineW,
        h: machineH,
        headerY: y + 10,
        headerH,
        targetY: y + headerH + 8,
        targetH,
        controlY: y + headerH + targetH + 8,
        controlH,
        scale: machineW / 390
      }
    }

    function layoutTargets() {
      if (state.targets.length) {
        return
      }

      TARGETS.forEach((target, index) => {
        state.targets.push({
          id: index,
          slot: target.slot,
          row: target.row,
          hue: target.hue,
          state: 'standing',
          hitAt: 0
        })
      })
    }

    function cannon() {
      const m = layout()
      const centerX = m.x + m.w * 0.5
      const muzzleY = m.controlY + m.controlH * 0.34
      return {
        centerX,
        baseY: m.y + m.h - 24,
        muzzleX: centerX,
        muzzleY
      }
    }

    function targetBounds(target) {
      const pose = targetPose(target)
      const w = 44 * pose.scale
      const h = 58 * pose.scale
      return {
        x: pose.x - w / 2,
        y: pose.baseY - h,
        w,
        h,
        pose
      }
    }

    function beltMetrics(row) {
      const m = layout()
      const stageX = m.x + 18
      const stageW = m.w - 36
      const x = stageX + 8
      const w = stageW - 16
      const beltH = (row === 0 ? 28 : 30) * m.scale
      const centerY = m.targetY + m.targetH * (row === 0 ? 0.42 : 0.76)
      const wheelR = beltH * 0.68
      const leftX = x + wheelR * 0.66
      const rightX = x + w - wheelR * 0.66
      const straight = rightX - leftX
      const topY = centerY - beltH * 0.35
      const bottomY = centerY + beltH * 0.35
      const arcR = (bottomY - topY) / 2
      return {
        m,
        x,
        y: centerY,
        w,
        h: beltH,
        leftX,
        rightX,
        straight,
        topY,
        bottomY,
        midY: centerY,
        arcR,
        perimeter: straight * 2 + Math.PI * arcR * 2
      }
    }

    function targetPose(target) {
      const metrics = beltMetrics(target.row)
      const direction = target.row === 0 ? -1 : 1
      let s = (target.slot * metrics.perimeter / 4 + state.beltOffset * direction) % metrics.perimeter
      if (s < 0) {
        s += metrics.perimeter
      }

      const topLen = metrics.straight
      const arcLen = Math.PI * metrics.arcR
      const bottomLen = metrics.straight
      let x = metrics.leftX
      let baseY = metrics.topY
      let angle = 0
      let layer = 'top'
      let scale = metrics.m.scale
      let alpha = 1

      if (s < topLen) {
        x = metrics.leftX + s
        baseY = metrics.topY
      } else if (s < topLen + arcLen) {
        const t = (s - topLen) / arcLen
        const a = -Math.PI / 2 + t * Math.PI
        x = metrics.rightX + Math.cos(a) * metrics.arcR
        baseY = metrics.midY + Math.sin(a) * metrics.arcR
        angle = t * Math.PI
        layer = 'turn'
        scale *= 0.94
      } else if (s < topLen + arcLen + bottomLen) {
        const t = (s - topLen - arcLen) / bottomLen
        x = metrics.rightX - t * metrics.straight
        baseY = metrics.bottomY
        angle = Math.PI
        layer = 'bottom'
        scale *= 0.74
        alpha = 0.5
      } else {
        const t = (s - topLen - arcLen - bottomLen) / arcLen
        const a = Math.PI / 2 + t * Math.PI
        x = metrics.leftX + Math.cos(a) * metrics.arcR
        baseY = metrics.midY + Math.sin(a) * metrics.arcR
        angle = Math.PI + t * Math.PI
        layer = 'turn'
        scale *= 0.94
      }

      return { x, baseY, angle, layer, scale, alpha }
    }

    function canHitTarget(target) {
      const pose = targetPose(target)
      return pose.layer === 'top' || pose.layer === 'turn'
    }

    function sortTargetsForDepth(a, b) {
      const ap = targetPose(a)
      const bp = targetPose(b)
      const depth = { bottom: 0, turn: 1, top: 2 }
      return depth[ap.layer] - depth[bp.layer] || ap.baseY - bp.baseY
    }

    function drawTargetsOnLayer(layerName) {
      state.targets
        .filter((target) => targetPose(target).layer === layerName)
        .sort(sortTargetsForDepth)
        .forEach(drawMonster)
    }

    function drawTargetsAboveBelts() {
      state.targets
        .filter((target) => targetPose(target).layer !== 'bottom')
        .sort(sortTargetsForDepth)
        .forEach(drawMonster)
    }

    function fire() {
      if (state.fireCooldown > 0) {
        return
      }

      const c = cannon()
      state.balls.push({
        x: c.muzzleX,
        y: c.muzzleY,
        vx: (Math.random() - 0.5) * 22,
        vy: -BALL_SPEED,
        r: 8 * layout().scale
      })
      state.fireCooldown = 0.075
      addFlash(c.muzzleX, c.muzzleY - 6, '#fff6ad')
    }

    function addFlash(x, y, color) {
      state.flashes.push({ x, y, color, life: 0.18, max: 0.18 })
    }

    function addParticles(x, y) {
      for (let i = 0; i < 12; i += 1) {
        const angle = Math.random() * Math.PI * 2
        const speed = 70 + Math.random() * 140
        state.particles.push({
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 30,
          life: 0.48,
          max: 0.48
        })
      }
    }

    function hitTarget(target, bounds, now) {
      target.state = 'down'
      target.hitAt = now
      state.score += POINTS
      addFlash(bounds.x + bounds.w / 2, bounds.y + bounds.h * 0.35, '#ffef75')
      addParticles(bounds.x + bounds.w / 2, bounds.y + bounds.h * 0.35)
    }

    function update(dt, now) {
      const m = layout()
      state.beltOffset += BELT_SPEED * dt
      state.fireCooldown = Math.max(0, state.fireCooldown - dt)

      state.targets.forEach((target) => {
        if (target.state === 'down' && now - target.hitAt >= TARGET_RESET_MS) {
          target.state = 'standing'
        }
      })

      state.balls.forEach((ball) => {
        ball.x += ball.vx * dt
        ball.y += ball.vy * dt
        ball.vy += 90 * dt
      })

      state.balls = state.balls.filter((ball) => {
        if (ball.y < m.headerY - 40 || ball.y > m.y + m.h + 40) {
          return false
        }

        for (let i = 0; i < state.targets.length; i += 1) {
          const target = state.targets[i]
          if (target.state !== 'standing') {
            continue
          }
          if (!canHitTarget(target)) {
            continue
          }

          const b = targetBounds(target)
          const hit =
            ball.x + ball.r > b.x + 5 &&
            ball.x - ball.r < b.x + b.w - 5 &&
            ball.y + ball.r > b.y + 4 &&
            ball.y - ball.r < b.y + b.h - 7
          if (hit) {
            hitTarget(target, b, now)
            return false
          }
        }

        return true
      })

      state.particles.forEach((particle) => {
        particle.x += particle.vx * dt
        particle.y += particle.vy * dt
        particle.vy += 260 * dt
        particle.life -= dt
      })
      state.particles = state.particles.filter((particle) => particle.life > 0)

      state.flashes.forEach((flash) => {
        flash.life -= dt
      })
      state.flashes = state.flashes.filter((flash) => flash.life > 0)
    }

    function roundedRect(x, y, w, h, r) {
      ctx.beginPath()
      ctx.moveTo(x + r, y)
      ctx.arcTo(x + w, y, x + w, y + h, r)
      ctx.arcTo(x + w, y + h, x, y + h, r)
      ctx.arcTo(x, y + h, x, y, r)
      ctx.arcTo(x, y, x + w, y, r)
      ctx.closePath()
    }

    function fillRounded(x, y, w, h, r, color) {
      ctx.fillStyle = color
      roundedRect(x, y, w, h, r)
      ctx.fill()
    }

    function strokeRounded(x, y, w, h, r, color, lineWidth) {
      ctx.strokeStyle = color
      ctx.lineWidth = lineWidth
      roundedRect(x, y, w, h, r)
      ctx.stroke()
    }

    function drawText(text, x, y, size, color, weight, align) {
      ctx.fillStyle = color
      ctx.font = `${weight || 800} ${size}px "Segoe UI", Arial, sans-serif`
      ctx.textAlign = align || 'center'
      ctx.textBaseline = 'middle'
      ctx.fillText(text, x, y)
    }

    function drawBackground() {
      const gradient = ctx.createLinearGradient(0, 0, 0, state.height)
      gradient.addColorStop(0, '#252b3a')
      gradient.addColorStop(1, '#0e1118')
      ctx.fillStyle = gradient
      ctx.fillRect(0, 0, state.width, state.height)
    }

    function drawCabinet() {
      const m = layout()
      fillRounded(m.x, m.y, m.w, m.h, 18, '#1d2431')
      strokeRounded(m.x + 2, m.y + 2, m.w - 4, m.h - 4, 16, '#f04b75', 5)
      strokeRounded(m.x + 9, m.y + 9, m.w - 18, m.h - 18, 12, '#51b9ff', 2)

      drawHeader(m)
      drawTargetStage(m)
      drawControlDeck(m)
    }

    function drawHeader(m) {
      const x = m.x + 14
      const y = m.headerY
      const w = m.w - 28
      const h = m.headerH - 8
      const bg = ctx.createLinearGradient(x, y, x + w, y + h)
      bg.addColorStop(0, '#146bd1')
      bg.addColorStop(0.55, '#2e9dec')
      bg.addColorStop(1, '#1657bb')
      fillRounded(x, y, w, h, 10, bg)

      drawText('梁二大炮乐园', x + w / 2, y + h * 0.13, Math.max(18, m.w * 0.056), '#fff6b0', 900)
      drawScoreWheel(x + w / 2, y + h * 0.56, Math.min(h * 0.25, w * 0.16))
      drawDecor(x + w * 0.18, y + h * 0.52, m.scale, '#8bd84e')
      drawDecor(x + w * 0.82, y + h * 0.55, m.scale, '#ffe35c')
      drawText('掉下去', x + w / 2, y + h * 0.88, Math.max(15, m.w * 0.04), '#ffffff', 900)
    }

    function drawScoreWheel(x, y, r) {
      ctx.save()
      ctx.translate(x, y)
      ctx.fillStyle = '#ff405f'
      ctx.beginPath()
      ctx.arc(0, 0, r * 1.28, 0, Math.PI * 2)
      ctx.fill()
      ctx.fillStyle = '#1d1117'
      ctx.beginPath()
      ctx.arc(0, 0, r * 0.72, 0, Math.PI * 2)
      ctx.fill()
      for (let i = 0; i < 10; i += 1) {
        const a = i * Math.PI * 2 / 10 + state.beltOffset * 0.035
        ctx.fillStyle = i % 2 ? '#ffbe3d' : '#fff088'
        ctx.beginPath()
        ctx.arc(Math.cos(a) * r, Math.sin(a) * r, r * 0.12, 0, Math.PI * 2)
        ctx.fill()
      }
      ctx.shadowColor = '#ff2d38'
      ctx.shadowBlur = 10
      drawText(String(state.score).padStart(3, '0'), 0, 1, r * 0.48, '#ff3038', 900)
      ctx.shadowBlur = 0
      ctx.restore()
    }

    function drawDecor(x, y, scale, color) {
      ctx.save()
      ctx.translate(x, y)
      ctx.scale(scale, scale)
      ctx.fillStyle = color
      ctx.beginPath()
      ctx.arc(0, 0, 18, 0, Math.PI * 2)
      ctx.fill()
      ctx.fillStyle = '#182431'
      ctx.beginPath()
      ctx.arc(-6, -5, 3, 0, Math.PI * 2)
      ctx.arc(6, -5, 3, 0, Math.PI * 2)
      ctx.fill()
      ctx.strokeStyle = '#182431'
      ctx.lineWidth = 3
      ctx.beginPath()
      ctx.moveTo(-9, 5)
      ctx.quadraticCurveTo(0, 13, 10, 5)
      ctx.stroke()
      ctx.restore()
    }

    function drawTargetStage(m) {
      const x = m.x + 18
      const y = m.targetY
      const w = m.w - 36
      const h = m.targetH
      const wall = ctx.createLinearGradient(x, y, x, y + h)
      wall.addColorStop(0, '#d7f2ff')
      wall.addColorStop(0.42, '#74c4f6')
      wall.addColorStop(1, '#fee66d')
      fillRounded(x, y, w, h, 10, wall)
      strokeRounded(x + 2, y + 2, w - 4, h - 4, 9, '#f8f9ff', 2)

      drawLights(x + 14, y + 10, w - 28, h * 0.18)
      drawTargetsOnLayer('bottom')
      drawConveyorRow(x + 8, y + h * 0.42, w - 16, 28 * m.scale, -1, m.scale)
      drawConveyorRow(x + 8, y + h * 0.76, w - 16, 30 * m.scale, 1, m.scale)
      drawText('击倒小怪兽', x + w / 2, y + h * 0.1, Math.max(13, m.w * 0.035), '#cc3459', 900)
    }

    function drawLights(x, y, w, h) {
      for (let i = 0; i < 18; i += 1) {
        const px = x + (w / 17) * i
        ctx.fillStyle = i % 3 === 0 ? '#ffeb56' : (i % 3 === 1 ? '#ff55a8' : '#53f2ff')
        ctx.globalAlpha = 0.62 + Math.sin(state.beltOffset * 0.12 + i) * 0.25
        ctx.beginPath()
        ctx.arc(px, y + h / 2, 3.2, 0, Math.PI * 2)
        ctx.fill()
      }
      ctx.globalAlpha = 1
    }

    function drawConveyorRow(x, y, w, h, direction, scale) {
      const wheelR = h * 0.68
      fillRounded(x, y - h * 0.5, w, h, h * 0.42, '#24313f')
      fillRounded(x + wheelR * 0.62, y - h * 0.32, w - wheelR * 1.24, h * 0.64, h * 0.24, '#3c4655')

      ctx.save()
      ctx.beginPath()
      roundedRect(x + wheelR * 0.62, y - h * 0.32, w - wheelR * 1.24, h * 0.64, h * 0.24)
      ctx.clip()
      const stripeW = 22 * scale
      const offset = (state.beltOffset * direction) % stripeW
      for (let sx = x - stripeW * 2 + offset; sx < x + w + stripeW; sx += stripeW) {
        ctx.fillStyle = '#556272'
        ctx.beginPath()
        ctx.moveTo(sx, y - h * 0.32)
        ctx.lineTo(sx + stripeW * 0.48, y - h * 0.32)
        ctx.lineTo(sx + stripeW, y + h * 0.32)
        ctx.lineTo(sx + stripeW * 0.52, y + h * 0.32)
        ctx.closePath()
        ctx.fill()
      }
      ctx.restore()

      drawPulley(x + wheelR * 0.66, y, wheelR, direction, scale)
      drawPulley(x + w - wheelR * 0.66, y, wheelR, direction, scale)
      ctx.fillStyle = '#7a5328'
      fillRounded(x + w * 0.05, y + h * 0.2, w * 0.9, h * 0.18, h * 0.08, '#c39030')
    }

    function drawPulley(x, y, r, direction, scale) {
      ctx.save()
      ctx.translate(x, y)
      ctx.rotate(state.beltOffset * direction * 0.055)
      ctx.fillStyle = '#121922'
      ctx.beginPath()
      ctx.arc(0, 0, r, 0, Math.PI * 2)
      ctx.fill()
      ctx.strokeStyle = '#d8e8f5'
      ctx.lineWidth = Math.max(2, 2.6 * scale)
      for (let i = 0; i < 6; i += 1) {
        ctx.rotate(Math.PI / 3)
        ctx.beginPath()
        ctx.moveTo(0, 0)
        ctx.lineTo(r * 0.76, 0)
        ctx.stroke()
      }
      ctx.fillStyle = '#263444'
      ctx.beginPath()
      ctx.arc(0, 0, r * 0.25, 0, Math.PI * 2)
      ctx.fill()
      ctx.restore()
    }

    function drawControlDeck(m) {
      const x = m.x + 18
      const y = m.controlY
      const w = m.w - 36
      const h = m.controlH - 18
      const deck = ctx.createLinearGradient(x, y, x, y + h)
      deck.addColorStop(0, '#51bbff')
      deck.addColorStop(0.55, '#1f86f0')
      deck.addColorStop(1, '#1663cd')
      fillRounded(x, y, w, h, 12, deck)
      strokeRounded(x + 2, y + 2, w - 4, h - 4, 10, '#a9e5ff', 2)

      drawBallPool(m)
      drawCannon(m)
    }

    function drawBallPool(m) {
      const x = m.x + 24
      const y = m.controlY + m.controlH * 0.47
      const r = 8 * m.scale
      const colors = ['#ffd052', '#45d16f', '#5bb7ff', '#ff6d78', '#ec8b36']
      for (let row = 0; row < 5; row += 1) {
        for (let col = 0; col < 5; col += 1) {
          ctx.fillStyle = colors[(row + col) % colors.length]
          ctx.beginPath()
          ctx.arc(x + col * r * 1.45 + (row % 2) * r * 0.6, y + row * r * 1.25, r, 0, Math.PI * 2)
          ctx.fill()
        }
      }
    }

    function drawCannon(m) {
      const c = cannon()
      const scale = m.scale
      const bodyW = 128 * scale
      const bodyH = 158 * scale
      const bodyX = c.centerX - bodyW / 2
      const bodyY = m.controlY + m.controlH * 0.22

      ctx.save()
      ctx.shadowColor = 'rgba(21, 239, 255, 0.75)'
      ctx.shadowBlur = 18
      fillRounded(bodyX, bodyY, bodyW, bodyH, 28 * scale, 'rgba(194, 238, 255, 0.26)')
      ctx.shadowBlur = 0

      fillRounded(bodyX + 16 * scale, bodyY + 34 * scale, bodyW - 32 * scale, bodyH - 46 * scale, 24 * scale, '#dff5ff')
      fillRounded(bodyX + 28 * scale, bodyY + 45 * scale, bodyW - 56 * scale, bodyH - 70 * scale, 18 * scale, '#6ed4ff')

      const barrelW = 42 * scale
      fillRounded(c.centerX - barrelW / 2, bodyY - 18 * scale, barrelW, 80 * scale, 18 * scale, '#f3fbff')
      fillRounded(c.centerX - barrelW * 0.34, bodyY - 34 * scale, barrelW * 0.68, 34 * scale, 14 * scale, '#96e2ff')
      fillRounded(c.centerX - barrelW * 0.22, bodyY - 47 * scale, barrelW * 0.44, 20 * scale, 9 * scale, '#1a2835')

      ctx.fillStyle = '#fff'
      ctx.beginPath()
      ctx.arc(c.centerX, bodyY + 22 * scale, 16 * scale, 0, Math.PI * 2)
      ctx.fill()
      ctx.strokeStyle = '#ffe738'
      ctx.lineWidth = 6 * scale
      ctx.beginPath()
      ctx.arc(c.centerX, bodyY + 22 * scale, 27 * scale, 0, Math.PI * 2)
      ctx.stroke()

      drawText('装弹口', c.centerX, bodyY + 62 * scale, 15 * scale, '#115586', 900)
      drawButton(c.centerX - bodyW * 0.39, bodyY + bodyH - 34 * scale, 18 * scale)
      drawButton(c.centerX + bodyW * 0.39, bodyY + bodyH - 34 * scale, 18 * scale)
      drawText('点击发射', c.centerX, bodyY + bodyH - 12 * scale, 16 * scale, '#fffbd2', 900)
      ctx.restore()
    }

    function drawButton(x, y, r) {
      ctx.fillStyle = '#b72231'
      ctx.beginPath()
      ctx.arc(x, y, r, 0, Math.PI * 2)
      ctx.fill()
      ctx.fillStyle = '#ff5663'
      ctx.beginPath()
      ctx.arc(x - r * 0.25, y - r * 0.25, r * 0.5, 0, Math.PI * 2)
      ctx.fill()
    }

    function drawMonster(target) {
      const b = targetBounds(target)
      const pose = b.pose
      const down = target.state === 'down'
      const colors = [
        ['#38d37f', '#167241'],
        ['#4fc4ff', '#1562b0'],
        ['#ff7060', '#a72828'],
        ['#ffc94f', '#ba7b14'],
        ['#b56cff', '#6a35a0']
      ][target.hue]

      ctx.save()
      ctx.globalAlpha = pose.alpha
      ctx.translate(b.x + b.w / 2, b.y + b.h)
      ctx.rotate(pose.angle)
      if (down) {
        const t = Math.min(1, (performance.now() - target.hitAt) / 180)
        ctx.rotate(-Math.PI * 0.48 * t)
        ctx.translate(0, -b.h * 0.08 * t)
      }

      fillRounded(-b.w * 0.5, -b.h * 0.12, b.w, b.h * 0.14, 5, '#744c2b')
      fillRounded(-b.w * 0.39, -b.h * 0.78, b.w * 0.78, b.h * 0.62, 13, colors[0])
      ctx.fillStyle = colors[1]
      ctx.beginPath()
      ctx.moveTo(-b.w * 0.32, -b.h * 0.78)
      ctx.lineTo(-b.w * 0.12, -b.h * 1.02)
      ctx.lineTo(-b.w * 0.02, -b.h * 0.78)
      ctx.fill()
      ctx.beginPath()
      ctx.moveTo(b.w * 0.15, -b.h * 0.78)
      ctx.lineTo(b.w * 0.36, -b.h * 1.02)
      ctx.lineTo(b.w * 0.32, -b.h * 0.75)
      ctx.fill()

      ctx.fillStyle = '#fff'
      ctx.beginPath()
      ctx.arc(-b.w * 0.16, -b.h * 0.56, b.w * 0.12, 0, Math.PI * 2)
      ctx.arc(b.w * 0.18, -b.h * 0.56, b.w * 0.12, 0, Math.PI * 2)
      ctx.fill()
      ctx.fillStyle = '#101520'
      ctx.beginPath()
      ctx.arc(-b.w * 0.14, -b.h * 0.55, b.w * 0.045, 0, Math.PI * 2)
      ctx.arc(b.w * 0.2, -b.h * 0.55, b.w * 0.045, 0, Math.PI * 2)
      ctx.fill()

      ctx.strokeStyle = '#101520'
      ctx.lineWidth = Math.max(2, b.w * 0.06)
      ctx.beginPath()
      ctx.moveTo(-b.w * 0.18, -b.h * 0.36)
      ctx.quadraticCurveTo(0, -b.h * 0.27, b.w * 0.2, -b.h * 0.36)
      ctx.stroke()
      ctx.globalAlpha = 1
      ctx.restore()
    }

    function drawBalls() {
      state.balls.forEach((ball) => {
        const glow = ctx.createRadialGradient(ball.x - ball.r * 0.35, ball.y - ball.r * 0.45, 1, ball.x, ball.y, ball.r)
        glow.addColorStop(0, '#ffffff')
        glow.addColorStop(1, '#dcefff')
        ctx.fillStyle = glow
        ctx.beginPath()
        ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2)
        ctx.fill()
      })
    }

    function drawEffects() {
      state.particles.forEach((particle) => {
        const alpha = Math.max(0, particle.life / particle.max)
        ctx.fillStyle = `rgba(255, 236, 94, ${alpha})`
        ctx.beginPath()
        ctx.arc(particle.x, particle.y, 3 + alpha * 3, 0, Math.PI * 2)
        ctx.fill()
      })

      state.flashes.forEach((flash) => {
        const alpha = Math.max(0, flash.life / flash.max)
        ctx.globalAlpha = alpha
        ctx.fillStyle = flash.color
        ctx.beginPath()
        ctx.arc(flash.x, flash.y, 20 * (1.2 - alpha), 0, Math.PI * 2)
        ctx.fill()
        ctx.globalAlpha = 1
      })
    }

    function draw() {
      drawBackground()
      drawCabinet()
      drawTargetsAboveBelts()
      drawBalls()
      drawEffects()
    }

    function loop(now) {
      const dt = Math.min(0.033, (now - state.lastTime) / 1000)
      state.lastTime = now
      update(dt, now)
      draw()
      requestAnimationFrame(loop)
    }

    function bindInput() {
      window.addEventListener('pointerdown', (event) => {
        if (event.target.closest('.back')) {
          return
        }
        fire()
      })

      window.addEventListener('keydown', (event) => {
        if (event.code === 'Space' || event.code === 'Enter') {
          event.preventDefault()
          fire()
        }
      })
    }

    resize()
    bindInput()
    requestAnimationFrame(loop)
    window.addEventListener('resize', resize)
  </script>
</body>
</html>
