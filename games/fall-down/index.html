<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>肖恩大炮乐园</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #171b25;
      color: #fff6db;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      touch-action: none;
      user-select: none;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    .rotate-lock {
      position: fixed;
      inset: 0;
      z-index: 4;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 28px;
      background: radial-gradient(circle at 50% 20%, #253044 0, #101520 58%, #080b12 100%);
      text-align: center;
    }

    .rotate-lock strong {
      display: block;
      margin-bottom: 10px;
      color: #fff4bb;
      font-size: 28px;
      line-height: 36px;
    }

    .rotate-lock > div {
      width: min(320px, 100%);
    }

    .rotate-lock span {
      display: block;
      color: #bcd2df;
      font-size: 15px;
      line-height: 24px;
      overflow-wrap: anywhere;
    }

    .back {
      position: fixed;
      left: 12px;
      top: 12px;
      z-index: 2;
      display: inline-flex;
      align-items: center;
      height: 34px;
      padding: 0 12px;
      border-radius: 6px;
      color: #11151b;
      background: rgba(255, 248, 226, 0.9);
      font-size: 14px;
      font-weight: 800;
      text-decoration: none;
    }

    @media (orientation: portrait) {
      canvas {
        display: none;
      }

      .rotate-lock {
        display: flex;
      }
    }
  </style>
</head>
<body>
  <a class="back" href="../../">返回</a>
  <div class="rotate-lock" aria-live="polite">
    <div>
      <strong>请横屏游玩</strong>
      <span>旋转手机后继续游戏</span>
    </div>
  </div>
  <canvas id="game" aria-label="肖恩大炮乐园游戏"></canvas>

  <script>
    const canvas = document.querySelector('#game')
    const ctx = canvas.getContext('2d')

    const state = {
      width: 0,
      height: 0,
      dpr: 1,
      scores: [0, 0, 0],
      lastTime: performance.now(),
      balls: [],
      targets: [],
      particles: [],
      flashes: [],
      beltOffset: 0,
      barberAngle: 0,
      cannonAngles: [0, 0, 0],
      fireCooldowns: [0, 0, 0]
    }

    const POINTS = 10
    const BALL_SPEED = 1380
    const BELT_SPEED = 72
    const GRAVITY = 1180
    const STUMBLE_CHANCE_PER_PASS = 0.005
    const LIFT_FAIL_CHANCE = 0.01
    const TARGETS = Array.from({ length: 12 }, (_, index) => ({
      slot: index,
      hue: index % 5
    }))

    function resize() {
      state.dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1))
      state.width = window.innerWidth
      state.height = window.innerHeight
      canvas.width = Math.floor(state.width * state.dpr)
      canvas.height = Math.floor(state.height * state.dpr)
      ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0)
      layoutTargets()
    }

    function layout() {
      const safeTop = state.height < 520 ? 24 : 56
      const machineW = Math.max(320, Math.min(state.width - 56, Math.max(720, state.height * 1.55)))
      const machineH = Math.min(state.height - safeTop - 20, Math.max(340, machineW * 0.47))
      const x = (state.width - machineW) / 2
      const y = safeTop
      const headerH = machineH * 0.23
      const targetH = machineH * 0.47
      const controlH = machineH - headerH - targetH
      return {
        x,
        y,
        w: machineW,
        h: machineH,
        headerY: y + 10,
        headerH,
        targetY: y + headerH + 8,
        targetH,
        controlY: y + headerH + targetH + 8,
        controlH,
        scale: machineW / 900
      }
    }

    function layoutTargets() {
      if (state.targets.length) {
        return
      }

      TARGETS.forEach((target, index) => {
        state.targets.push({
          id: index,
          slot: target.slot,
          hue: target.hue,
          state: 'standing',
          hitAt: 0,
          scorer: -1,
          inGate: -1,
          liftGate: -1,
          liftFailed: false,
          resetOnNextTop: false,
          readyForStumble: true
        })
      })
    }

    function cannons() {
      const m = layout()
      return [0.22, 0.5, 0.78].map((ratio, index) => {
        const centerX = m.x + m.w * ratio
        return {
          index,
          centerX,
          baseY: m.y + m.h - 18 * m.scale,
          muzzleX: centerX,
          muzzleY: m.controlY + m.controlH * 0.35,
          angleLimit: Math.PI / 12
        }
      })
    }

    function targetBounds(target) {
      const pose = targetPose(target)
      const w = 40 * pose.scale
      const h = 34 * pose.scale
      const trayOffset = h * 0.12
      return {
        x: pose.x - w / 2,
        y: pose.baseY - h + trayOffset,
        w,
        h,
        trayOffset,
        pose
      }
    }

    function beltMetrics() {
      const m = layout()
      const stageX = m.x + 18
      const stageW = m.w - 36
      const x = stageX + 8
      const w = stageW - 16
      const beltH = 54 * m.scale
      const centerY = m.targetY + m.targetH * 0.74
      const wheelR = beltH * 0.52
      const leftX = x + wheelR * 0.66
      const rightX = x + w - wheelR * 0.66
      const straight = rightX - leftX
      const topY = centerY - beltH * 0.35
      const bottomY = centerY + beltH * 0.35
      const arcR = (bottomY - topY) / 2
      return {
        m,
        x,
        y: centerY,
        w,
        h: beltH,
        leftX,
        rightX,
        straight,
        topY,
        bottomY,
        midY: centerY,
        arcR,
        perimeter: straight * 2 + Math.PI * arcR * 2
      }
    }

    function targetPose(target) {
      const metrics = beltMetrics()
      let s = (target.slot * metrics.perimeter / TARGETS.length + state.beltOffset) % metrics.perimeter
      if (s < 0) {
        s += metrics.perimeter
      }

      const topLen = metrics.straight
      const arcLen = Math.PI * metrics.arcR
      const bottomLen = metrics.straight
      let x = metrics.leftX
      let baseY = metrics.topY
      let angle = 0
      let layer = 'top'
      let scale = metrics.m.scale * 1.2
      let alpha = 1

      if (s < topLen) {
        x = metrics.leftX + s
        baseY = metrics.topY
      } else if (s < topLen + arcLen) {
        const t = (s - topLen) / arcLen
        const a = -Math.PI / 2 + t * Math.PI
        x = metrics.rightX + Math.cos(a) * metrics.arcR
        baseY = metrics.midY + Math.sin(a) * metrics.arcR
        angle = t * Math.PI
        layer = 'turn'
        scale *= 0.9
      } else if (s < topLen + arcLen + bottomLen) {
        const t = (s - topLen - arcLen) / bottomLen
        x = metrics.rightX - t * metrics.straight
        baseY = metrics.bottomY
        angle = Math.PI
        layer = 'bottom'
        scale *= 0.82
        alpha = 0.42
      } else {
        const t = (s - topLen - arcLen - bottomLen) / arcLen
        const a = Math.PI / 2 + t * Math.PI
        x = metrics.leftX + Math.cos(a) * metrics.arcR
        baseY = metrics.midY + Math.sin(a) * metrics.arcR
        angle = Math.PI + t * Math.PI
        layer = 'turn'
        scale *= 0.9
      }

      return { x, baseY, angle, layer, scale, alpha }
    }

    function canHitTarget(target) {
      const pose = targetPose(target)
      return pose.layer === 'top' || pose.layer === 'turn'
    }

    function scoreGates() {
      const metrics = beltMetrics()
      const c = cannons()
      const positions = [
        (c[0].centerX + c[1].centerX) / 2,
        (c[1].centerX + c[2].centerX) / 2,
        (c[2].centerX + metrics.rightX) / 2
      ]
      return positions.map((x, index) => ({
        index,
        x,
        y: metrics.topY - 2 * metrics.m.scale,
        w: 27 * metrics.m.scale,
        h: 27 * metrics.m.scale
      }))
    }

    function scoreGate(index) {
      return scoreGates()[index]
    }

    function gateProgress(target, gate) {
      const pose = targetPose(target)
      if (pose.layer !== 'top') {
        return -1
      }
      const start = gate.x - gate.w * 1.15
      const peak = gate.x
      const exit = gate.x + gate.w * 0.7
      if (pose.x < start || pose.x > exit) {
        return -1
      }
      return Math.max(0, Math.min(1, (pose.x - start) / (peak - start)))
    }

    function activeGateForTarget(target) {
      const gates = scoreGates()
      for (let i = 0; i < gates.length; i += 1) {
        const gate = gates[i]
        if (gate && gateProgress(target, gate) >= 0) {
          return gate
        }
      }
      return null
    }

    function sortTargetsForDepth(a, b) {
      const ap = targetPose(a)
      const bp = targetPose(b)
      const depth = { bottom: 0, turn: 1, top: 2 }
      return depth[ap.layer] - depth[bp.layer] || ap.baseY - bp.baseY
    }

    function drawTargetsOnLayer(layerName) {
      state.targets
        .filter((target) => targetPose(target).layer === layerName)
        .sort(sortTargetsForDepth)
        .forEach(drawMonster)
    }

    function drawTargetsAboveBelts() {
      state.targets
        .filter((target) => targetPose(target).layer !== 'bottom')
        .sort(sortTargetsForDepth)
        .forEach(drawMonster)
    }

    function fire(cannonIndex, angle) {
      if (state.fireCooldowns[cannonIndex] > 0) {
        return
      }

      const m = layout()
      const c = cannons()[cannonIndex]
      const shotAngle = angle || 0
      const shotY = m.targetY + m.targetH - 20 * m.scale
      state.cannonAngles[cannonIndex] = shotAngle
      state.balls.push({
        x: c.muzzleX,
        y: shotY,
        vx: Math.sin(shotAngle) * BALL_SPEED,
        vy: -Math.cos(shotAngle) * BALL_SPEED,
        r: 7.5 * m.scale,
        cannon: cannonIndex,
        color: ['#ff5c76', '#1f8cff', '#52d64f'][cannonIndex],
        core: ['#fff0f3', '#eef8ff', '#f1ffe8'][cannonIndex],
        trail: [],
        bounces: 0,
        life: 2.7,
        hitTargets: []
      })
      addFlash(c.muzzleX, shotY - 6, '#fff6ad')
      state.fireCooldowns[cannonIndex] = 0.16
    }

    function addFlash(x, y, color) {
      state.flashes.push({ x, y, color, life: 0.18, max: 0.18 })
    }

    function addParticles(x, y) {
      for (let i = 0; i < 12; i += 1) {
        const angle = Math.random() * Math.PI * 2
        const speed = 70 + Math.random() * 140
        state.particles.push({
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 30,
          life: 0.48,
          max: 0.48
        })
      }
    }

    function hitTarget(target, bounds, ball, now) {
      target.state = 'down'
      target.hitAt = now
      target.scorer = ball.cannon
      target.liftGate = -1
      target.liftFailed = false
      addFlash(bounds.x + bounds.w / 2, bounds.y + bounds.h * 0.35, '#ffef75')
      addParticles(bounds.x + bounds.w / 2, bounds.y + bounds.h * 0.35)
    }

    function knockTargetDown(target, now, scorer) {
      const b = targetBounds(target)
      target.state = 'down'
      target.hitAt = now
      target.scorer = scorer
      target.liftGate = -1
      target.liftFailed = false
      addFlash(b.x + b.w / 2, b.y + b.h * 0.45, '#ffcc66')
    }

    function scoreTarget(target, gate, now) {
      state.scores[gate.index] += POINTS
      addFlash(gate.x, gate.y - gate.h * 0.35, '#ff3a4c')
      target.scorer = -1
      target.hitAt = now
      target.liftFailed = Math.random() < LIFT_FAIL_CHANCE
      if (target.liftFailed) {
        addParticles(gate.x, gate.y)
      }
    }

    function update(dt, now) {
      const m = layout()
      const metrics = beltMetrics()
      const wallLeft = metrics.x + 6 * m.scale
      const wallRight = metrics.x + metrics.w - 6 * m.scale
      const wallTop = m.targetY + 12 * m.scale
      const gameBottom = m.targetY + m.targetH - 7 * m.scale
      state.beltOffset += BELT_SPEED * dt
      state.barberAngle += (2.4 + Math.sin(now * 0.0017) * 1.2 + Math.sin(now * 0.0041) * 0.55) * dt
      state.fireCooldowns = state.fireCooldowns.map((cooldown) => Math.max(0, cooldown - dt))

      state.targets.forEach((target) => {
        const pose = targetPose(target)
        if (target.state === 'down' && pose.layer !== 'top') {
          target.inGate = -1
          target.liftGate = -1
          target.liftFailed = false
          target.resetOnNextTop = true
          target.readyForStumble = true
        }

        if (pose.layer !== 'top') {
          target.readyForStumble = true
        }

        if (pose.layer === 'top' && target.resetOnNextTop) {
          target.resetOnNextTop = false
          target.scorer = -1
          target.inGate = -1
          target.liftGate = -1
          target.liftFailed = false
          if (Math.random() < 0.99) {
            target.state = 'standing'
            target.readyForStumble = false
          } else {
            target.state = 'down'
            target.hitAt = now
          }
        }

        if (target.state === 'standing' && pose.layer === 'top' && target.readyForStumble) {
          target.readyForStumble = false
          if (Math.random() < STUMBLE_CHANCE_PER_PASS) {
            knockTargetDown(target, now, -1)
          }
        }

        const gate = target.state === 'down' ? activeGateForTarget(target) : null
        if (!gate) {
          target.inGate = -1
          target.liftGate = -1
          target.liftFailed = false
        } else if (target.inGate !== gate.index) {
          target.inGate = gate.index
          target.liftGate = gate.index
          scoreTarget(target, gate, now)
        } else {
          target.liftGate = gate.index
        }

        if (gate && target.inGate === gate.index && gateProgress(target, gate) >= 0.98 && !target.liftFailed) {
          target.state = 'standing'
          target.scorer = -1
          target.inGate = -1
          target.liftGate = -1
          target.readyForStumble = false
        }
      })

      state.balls.forEach((ball) => {
        ball.trail.push({ x: ball.x, y: ball.y })
        if (ball.trail.length > 7) {
          ball.trail.shift()
        }
        ball.x += ball.vx * dt
        ball.y += ball.vy * dt
        ball.vy += GRAVITY * (ball.bounces > 0 ? 1.15 : 0.22) * dt
        ball.life -= dt

        if (ball.x - ball.r < wallLeft) {
          ball.x = wallLeft + ball.r
          ball.vx = Math.abs(ball.vx) + 120 * m.scale
          ball.vy = Math.max(190 * m.scale, Math.abs(ball.vy) * 0.42)
          ball.bounces += 1
          addFlash(ball.x, ball.y, '#9ff8ff')
        } else if (ball.x + ball.r > wallRight) {
          ball.x = wallRight - ball.r
          ball.vx = -Math.abs(ball.vx) - 120 * m.scale
          ball.vy = Math.max(190 * m.scale, Math.abs(ball.vy) * 0.42)
          ball.bounces += 1
          addFlash(ball.x, ball.y, '#9ff8ff')
        }

        if (ball.y - ball.r < wallTop) {
          ball.y = wallTop + ball.r
          ball.vy = Math.abs(ball.vy) * 0.56 + 160 * m.scale
          ball.vx += (ball.cannon - 1) * 95 * m.scale
          ball.bounces += 1
          addFlash(ball.x, ball.y, '#9ff8ff')
        }
      })

      state.balls = state.balls.filter((ball) => {
        if (ball.life <= 0 || ball.y + ball.r > gameBottom || ball.y < m.headerY - 80) {
          return false
        }

        for (let i = 0; i < state.targets.length; i += 1) {
          const target = state.targets[i]
          if (target.state !== 'standing' || ball.hitTargets.includes(target.id)) {
            continue
          }
          if (!canHitTarget(target)) {
            continue
          }

          const b = targetBounds(target)
          const hit =
            ball.x + ball.r > b.x + 5 &&
            ball.x - ball.r < b.x + b.w - 5 &&
            ball.y + ball.r > b.y + 4 &&
            ball.y - ball.r < b.y + b.h - 7
          if (hit) {
            hitTarget(target, b, ball, now)
            ball.hitTargets.push(target.id)
            ball.bounces += 1
            const dir = ball.x < b.x + b.w / 2 ? -1 : 1
            ball.vx = dir * (260 + Math.abs(ball.vx) * 0.35)
            ball.vy = 330 + Math.random() * 120
            return true
          }
        }

        return true
      })

      state.particles.forEach((particle) => {
        particle.x += particle.vx * dt
        particle.y += particle.vy * dt
        particle.vy += 260 * dt
        particle.life -= dt
      })
      state.particles = state.particles.filter((particle) => particle.life > 0)

      state.flashes.forEach((flash) => {
        flash.life -= dt
      })
      state.flashes = state.flashes.filter((flash) => flash.life > 0)
    }

    function roundedRect(x, y, w, h, r) {
      ctx.beginPath()
      ctx.moveTo(x + r, y)
      ctx.arcTo(x + w, y, x + w, y + h, r)
      ctx.arcTo(x + w, y + h, x, y + h, r)
      ctx.arcTo(x, y + h, x, y, r)
      ctx.arcTo(x, y, x + w, y, r)
      ctx.closePath()
    }

    function fillRounded(x, y, w, h, r, color) {
      ctx.fillStyle = color
      roundedRect(x, y, w, h, r)
      ctx.fill()
    }

    function strokeRounded(x, y, w, h, r, color, lineWidth) {
      ctx.strokeStyle = color
      ctx.lineWidth = lineWidth
      roundedRect(x, y, w, h, r)
      ctx.stroke()
    }

    function drawText(text, x, y, size, color, weight, align) {
      ctx.fillStyle = color
      ctx.font = `${weight || 800} ${size}px "Segoe UI", Arial, sans-serif`
      ctx.textAlign = align || 'center'
      ctx.textBaseline = 'middle'
      ctx.fillText(text, x, y)
    }

    function drawBackground() {
      const gradient = ctx.createLinearGradient(0, 0, state.width, state.height)
      gradient.addColorStop(0, '#1e2533')
      gradient.addColorStop(0.5, '#101824')
      gradient.addColorStop(1, '#262032')
      ctx.fillStyle = gradient
      ctx.fillRect(0, 0, state.width, state.height)

      ctx.globalAlpha = 0.18
      for (let i = 0; i < 12; i += 1) {
        ctx.fillStyle = i % 2 ? '#ffcc4d' : '#4fd2ff'
        ctx.beginPath()
        ctx.arc((state.width / 11) * i, state.height * 0.16 + Math.sin(i) * 18, 18, 0, Math.PI * 2)
        ctx.fill()
      }
      ctx.globalAlpha = 1
    }

    function drawCabinet() {
      const m = layout()
      drawBarberLight(m)
      fillRounded(m.x, m.y, m.w, m.h, 24, '#202938')
      strokeRounded(m.x + 2, m.y + 2, m.w - 4, m.h - 4, 22, '#ff5b86', 6)
      strokeRounded(m.x + 12, m.y + 12, m.w - 24, m.h - 24, 16, '#61d5ff', 3)

      drawHeader(m)
      drawTargetStage(m)
      drawControlDeck(m)
    }

    function drawHeader(m) {
      const x = m.x + 14
      const y = m.headerY
      const w = m.w - 28
      const h = m.headerH - 8
      const bg = ctx.createLinearGradient(x, y, x + w, y + h)
      bg.addColorStop(0, '#146bd1')
      bg.addColorStop(0.55, '#2e9dec')
      bg.addColorStop(1, '#1657bb')
      fillRounded(x, y, w, h, 10, bg)

      const signW = Math.min(w * 0.5, 430 * m.scale)
      const signX = x + w * 0.5 - signW / 2
      const signY = y + h * 0.08
      const signH = h * 0.46
      const sign = ctx.createLinearGradient(signX, signY, signX, signY + signH)
      sign.addColorStop(0, '#3b1332')
      sign.addColorStop(0.52, '#db287d')
      sign.addColorStop(1, '#5a166d')
      fillRounded(signX, signY, signW, signH, 12 * m.scale, sign)
      strokeRounded(signX + 2, signY + 2, signW - 4, signH - 4, 10 * m.scale, '#fff178', 3 * m.scale)
      ctx.shadowColor = '#fff178'
      ctx.shadowBlur = 14
      drawText('肖恩大炮乐园', signX + signW / 2, signY + signH * 0.52, Math.max(24, m.w * 0.04), '#fff6b0', 900)
      ctx.shadowBlur = 0
      drawHeaderScoreBoards(m, y + h * 0.6)
      drawDecor(x + w * 0.06, y + h * 0.52, m.scale * 0.8, '#8bd84e')
      drawDecor(x + w * 0.97, y + h * 0.52, m.scale * 0.8, '#ffe35c')
    }

    function drawScoreBoard(x, y, w, h, index, scale) {
      ctx.save()
      fillRounded(x - 4 * scale, y - 4 * scale, w + 8 * scale, h + 8 * scale, 9 * scale, '#111722')
      strokeRounded(x - 4 * scale, y - 4 * scale, w + 8 * scale, h + 8 * scale, 9 * scale, '#f0d3a7', 2.2 * scale)
      fillRounded(x, y, w, h, 7 * scale, '#33252b')
      strokeRounded(x + 1, y + 1, w - 2, h - 2, 6 * scale, '#ffdbe2', 1.3 * scale)
      fillRounded(x + w * 0.08, y + h * 0.18, w * 0.84, h * 0.58, 4 * scale, '#17090d')
      ctx.shadowColor = '#ff2d38'
      ctx.shadowBlur = 10
      drawText(String(state.scores[index]).padStart(3, '0'), x + w * 0.5, y + h * 0.47, Math.max(15, h * 0.36), '#ff3038', 900)
      ctx.shadowBlur = 0
      ctx.restore()
    }

    function drawBarberLight(m) {
      const x = m.x + m.w / 2
      const y = m.y - 18 * m.scale
      const w = Math.min(250 * m.scale, m.w * 0.28)
      const h = 18 * m.scale
      ctx.save()
      ctx.translate(x, y)
      fillRounded(-w / 2 - 12 * m.scale, -h / 2 - 7 * m.scale, w + 24 * m.scale, h + 14 * m.scale, h, '#16333a')
      ctx.beginPath()
      roundedRect(-w / 2, -h / 2, w, h, h * 0.5)
      ctx.clip()
      ctx.fillStyle = '#effcff'
      ctx.fillRect(-w / 2, -h / 2, w, h)
      const stripeW = 16 * m.scale
      const cycleW = stripeW * 4
      const colors = ['#f7365f', '#ffffff', '#3cbcff', '#ffffff']
      const offset = (state.barberAngle * 48 * m.scale) % cycleW
      for (let sx = -w - cycleW + offset; sx < w + cycleW; sx += cycleW) {
        for (let i = 0; i < colors.length; i += 1) {
          ctx.save()
          ctx.translate(sx + stripeW * i, 0)
          ctx.rotate(-0.52)
          ctx.fillStyle = colors[i]
          ctx.fillRect(-stripeW * 0.5, -h * 2, stripeW, h * 4)
          ctx.restore()
        }
      }
      ctx.restore()
    }

    function drawHeaderScoreBoards(m, y) {
      cannons().forEach((c, index) => {
        const w = 98 * m.scale
        const h = 40 * m.scale
        drawScoreBoard(c.centerX - w / 2, y, w, h, index, m.scale)
      })
    }

    function drawDecor(x, y, scale, color) {
      ctx.save()
      ctx.translate(x, y)
      ctx.scale(scale, scale)
      ctx.fillStyle = color
      ctx.beginPath()
      ctx.arc(0, 0, 18, 0, Math.PI * 2)
      ctx.fill()
      ctx.fillStyle = '#182431'
      ctx.beginPath()
      ctx.arc(-6, -5, 3, 0, Math.PI * 2)
      ctx.arc(6, -5, 3, 0, Math.PI * 2)
      ctx.fill()
      ctx.strokeStyle = '#182431'
      ctx.lineWidth = 3
      ctx.beginPath()
      ctx.moveTo(-9, 5)
      ctx.quadraticCurveTo(0, 13, 10, 5)
      ctx.stroke()
      ctx.restore()
    }

    function drawTargetStage(m) {
      const x = m.x + 18
      const y = m.targetY
      const w = m.w - 36
      const h = m.targetH
      const wall = ctx.createLinearGradient(x, y, x, y + h)
      wall.addColorStop(0, '#f8fdff')
      wall.addColorStop(0.5, '#bfeeff')
      wall.addColorStop(1, '#ffe685')
      fillRounded(x, y, w, h, 14, wall)
      strokeRounded(x + 2, y + 2, w - 4, h - 4, 12, '#f8f9ff', 2)

      drawLights(x + 14, y + 10, w - 28, h * 0.18)
      drawAimRings(m)
      drawTargetsOnLayer('bottom')
      drawConveyorRow(x + 8, y + h * 0.74, w - 16, 54 * m.scale, 1, m.scale)
      drawScoreGates(m)
    }

    function drawAimRings(m) {
      const y = m.targetY + m.targetH * 0.53
      cannons().forEach((c) => {
        ctx.save()
        ctx.shadowColor = '#2fffee'
        ctx.shadowBlur = 18
        ctx.strokeStyle = '#35f5e6'
        ctx.lineWidth = Math.max(4, 7 * m.scale)
        ctx.globalAlpha = 0.72
        ctx.beginPath()
        ctx.arc(c.centerX, y, 43 * m.scale, 0, Math.PI * 2)
        ctx.stroke()
        ctx.globalAlpha = 0.2
        ctx.lineWidth = Math.max(2, 3 * m.scale)
        ctx.beginPath()
        ctx.arc(c.centerX, y, 53 * m.scale, 0, Math.PI * 2)
        ctx.stroke()
        ctx.restore()
      })
    }

    function drawScoreGates(m) {
      scoreGates().forEach((gate) => {
        ctx.save()
        const steel = ctx.createLinearGradient(gate.x - gate.w * 0.5, gate.y - gate.h * 0.72, gate.x + gate.w * 0.5, gate.y + gate.h * 0.15)
        steel.addColorStop(0, '#eef3f4')
        steel.addColorStop(0.28, '#9fa9ad')
        steel.addColorStop(0.55, '#f8fbfb')
        steel.addColorStop(1, '#6f7a7f')
        ctx.fillStyle = steel
        ctx.beginPath()
        ctx.moveTo(gate.x, gate.y - gate.h * 0.72)
        ctx.lineTo(gate.x - gate.w * 0.5, gate.y + gate.h * 0.12)
        ctx.lineTo(gate.x + gate.w * 0.5, gate.y + gate.h * 0.12)
        ctx.closePath()
        ctx.fill()
        ctx.strokeStyle = '#5c666b'
        ctx.lineWidth = Math.max(1, 1.8 * m.scale)
        ctx.stroke()
        ctx.fillStyle = 'rgba(255,255,255,0.55)'
        ctx.beginPath()
        ctx.moveTo(gate.x - gate.w * 0.1, gate.y - gate.h * 0.5)
        ctx.lineTo(gate.x - gate.w * 0.28, gate.y - gate.h * 0.03)
        ctx.lineTo(gate.x + gate.w * 0.08, gate.y - gate.h * 0.03)
        ctx.closePath()
        ctx.fill()
        fillRounded(gate.x - gate.w * 0.55, gate.y + gate.h * 0.1, gate.w * 1.1, gate.h * 0.16, 3 * m.scale, '#7d8588')
        ctx.restore()
      })
    }

    function drawLights(x, y, w, h) {
      for (let i = 0; i < 18; i += 1) {
        const px = x + (w / 17) * i
        ctx.fillStyle = i % 3 === 0 ? '#ffeb56' : (i % 3 === 1 ? '#ff55a8' : '#53f2ff')
        ctx.globalAlpha = 0.62 + Math.sin(state.beltOffset * 0.12 + i) * 0.25
        ctx.beginPath()
        ctx.arc(px, y + h / 2, 3.2, 0, Math.PI * 2)
        ctx.fill()
      }
      ctx.globalAlpha = 1
    }

    function drawConveyorRow(x, y, w, h, direction, scale) {
      const wheelR = h * 0.48
      fillRounded(x, y - h * 0.5, w, h, h * 0.42, '#24313f')
      fillRounded(x + wheelR * 0.86, y - h * 0.32, w - wheelR * 1.72, h * 0.64, h * 0.24, '#3c4655')

      ctx.save()
      ctx.beginPath()
      roundedRect(x + wheelR * 0.86, y - h * 0.32, w - wheelR * 1.72, h * 0.64, h * 0.24)
      ctx.clip()
      const stripeW = 22 * scale
      const offset = (state.beltOffset * direction) % stripeW
      for (let sx = x - stripeW * 2 + offset; sx < x + w + stripeW; sx += stripeW) {
        ctx.fillStyle = '#556272'
        ctx.beginPath()
        ctx.moveTo(sx, y - h * 0.32)
        ctx.lineTo(sx + stripeW * 0.48, y - h * 0.32)
        ctx.lineTo(sx + stripeW, y + h * 0.32)
        ctx.lineTo(sx + stripeW * 0.52, y + h * 0.32)
        ctx.closePath()
        ctx.fill()
      }
      ctx.restore()

      drawPulley(x + wheelR * 0.72, y, wheelR, direction, scale)
      drawPulley(x + w - wheelR * 0.72, y, wheelR, direction, scale)
      ctx.fillStyle = '#7a5328'
      fillRounded(x + w * 0.05, y + h * 0.2, w * 0.9, h * 0.18, h * 0.08, '#c39030')
    }

    function drawPulley(x, y, r, direction, scale) {
      ctx.save()
      ctx.translate(x, y)
      ctx.rotate(state.beltOffset * direction * 0.055)
      ctx.fillStyle = '#121922'
      ctx.beginPath()
      ctx.arc(0, 0, r, 0, Math.PI * 2)
      ctx.fill()
      ctx.strokeStyle = '#d8e8f5'
      ctx.lineWidth = Math.max(2, 2.6 * scale)
      for (let i = 0; i < 6; i += 1) {
        ctx.rotate(Math.PI / 3)
        ctx.beginPath()
        ctx.moveTo(0, 0)
        ctx.lineTo(r * 0.68, 0)
        ctx.stroke()
      }
      ctx.fillStyle = '#263444'
      ctx.beginPath()
      ctx.arc(0, 0, r * 0.22, 0, Math.PI * 2)
      ctx.fill()
      ctx.restore()
    }

    function drawControlDeck(m) {
      const x = m.x + 18
      const y = m.controlY
      const w = m.w - 36
      const h = m.controlH - 18
      const deck = ctx.createLinearGradient(x, y, x + w, y + h)
      deck.addColorStop(0, '#47b9ff')
      deck.addColorStop(0.5, '#1f86f0')
      deck.addColorStop(1, '#6f74ff')
      fillRounded(x, y, w, h, 12, deck)
      strokeRounded(x + 2, y + 2, w - 4, h - 4, 10, '#a9e5ff', 2)

      drawCannons(m)
    }

    function drawAimZones(m) {
      const topY = m.targetY + 8 * m.scale
      cannons().forEach((c) => {
        const reach = c.muzzleY - topY
        const spread = Math.tan(c.angleLimit) * reach
        ctx.save()
        ctx.globalAlpha = 0.08
        ctx.fillStyle = '#ff1744'
        ctx.beginPath()
        ctx.moveTo(c.muzzleX, c.muzzleY)
        ctx.lineTo(c.muzzleX - spread, topY)
        ctx.lineTo(c.muzzleX + spread, topY)
        ctx.closePath()
        ctx.fill()
        ctx.restore()
      })
    }

    function drawBallPool(m) {
      const x = m.x + 24
      const y = m.controlY + m.controlH * 0.47
      const r = 8 * m.scale
      const colors = ['#ffd052', '#45d16f', '#5bb7ff', '#ff6d78', '#ec8b36']
      for (let row = 0; row < 5; row += 1) {
        for (let col = 0; col < 5; col += 1) {
          ctx.fillStyle = colors[(row + col) % colors.length]
          ctx.beginPath()
          ctx.arc(x + col * r * 1.45 + (row % 2) * r * 0.6, y + row * r * 1.25, r, 0, Math.PI * 2)
          ctx.fill()
        }
      }
    }

    function drawCannons(m) {
      cannons().forEach((c, index) => drawCannon(m, c, index))
    }

    function drawCannon(m, c, index) {
      const scale = m.scale
      const bodyW = 63 * scale
      const bodyH = 66 * scale
      const bodyX = c.centerX - bodyW / 2
      const bodyY = m.controlY + m.controlH * 0.36

      ctx.save()
      ctx.shadowColor = 'rgba(21, 239, 255, 0.75)'
      ctx.shadowBlur = 18
      fillRounded(bodyX, bodyY, bodyW, bodyH, 14 * scale, 'rgba(194, 238, 255, 0.26)')
      ctx.shadowBlur = 0

      fillRounded(bodyX + 8 * scale, bodyY + 17 * scale, bodyW - 16 * scale, bodyH - 23 * scale, 12 * scale, '#dff5ff')
      fillRounded(bodyX + 14 * scale, bodyY + 22 * scale, bodyW - 28 * scale, bodyH - 35 * scale, 9 * scale, '#6ed4ff')

      ctx.fillStyle = '#fff'
      ctx.beginPath()
      ctx.arc(c.centerX, bodyY + 11 * scale, 8 * scale, 0, Math.PI * 2)
      ctx.fill()
      ctx.strokeStyle = '#ffe738'
      ctx.lineWidth = 3 * scale
      ctx.beginPath()
      ctx.arc(c.centerX, bodyY + 11 * scale, 13.5 * scale, 0, Math.PI * 2)
      ctx.stroke()

      const barrelW = 21 * scale
      const aimAngle = state.cannonAngles[index] || 0
      ctx.save()
      ctx.translate(c.centerX, bodyY + 11 * scale)
      ctx.rotate(aimAngle)
      fillRounded(-barrelW / 2, -20 * scale, barrelW, 40 * scale, 9 * scale, '#f3fbff')
      fillRounded(-barrelW * 0.34, -28 * scale, barrelW * 0.68, 17 * scale, 7 * scale, '#96e2ff')
      fillRounded(-barrelW * 0.22, -35 * scale, barrelW * 0.44, 10 * scale, 4.5 * scale, '#1a2835')
      ctx.restore()

      drawButton(c.centerX - bodyW * 0.36, bodyY + bodyH - 15 * scale, 8 * scale)
      drawButton(c.centerX + bodyW * 0.36, bodyY + bodyH - 15 * scale, 8 * scale)
      if (state.fireCooldowns[index] > 0) {
        ctx.globalAlpha = 0.35
        ctx.fillStyle = '#ffffff'
        ctx.beginPath()
        ctx.arc(c.centerX, c.muzzleY - 8 * scale, 18 * scale, 0, Math.PI * 2)
        ctx.fill()
        ctx.globalAlpha = 1
      }
      ctx.restore()
    }

    function drawButton(x, y, r) {
      ctx.fillStyle = '#b72231'
      ctx.beginPath()
      ctx.arc(x, y, r, 0, Math.PI * 2)
      ctx.fill()
      ctx.fillStyle = '#ff5663'
      ctx.beginPath()
      ctx.arc(x - r * 0.25, y - r * 0.25, r * 0.5, 0, Math.PI * 2)
      ctx.fill()
    }

    function drawMonster(target) {
      const b = targetBounds(target)
      const pose = b.pose
      const down = target.state === 'down'
      const colors = [
        ['#6ee77f', '#23a848', '#176b36'],
        ['#75d8ff', '#2496d1', '#12618c'],
        ['#ff9a6a', '#e5533e', '#9c2b24'],
        ['#ffe06a', '#e6a82b', '#9c6815'],
        ['#c890ff', '#7c4bd6', '#4a2d8f']
      ][target.hue]

      ctx.save()
      ctx.globalAlpha = pose.alpha
      ctx.translate(b.x + b.w / 2, b.y + b.h)
      ctx.rotate(pose.angle)

      fillRounded(-b.w * 0.5, -b.h * 0.06, b.w, b.h * 0.14, 5, '#744c2b')

      ctx.save()
      if (down) {
        const gate = target.liftGate >= 0 ? scoreGate(target.liftGate) : null
        const lift = gate ? Math.max(0, gateProgress(target, gate)) : 0
        const fall = target.liftFailed ? 1 : 1 - lift
        const hitFall = Math.min(1, (performance.now() - target.hitAt) / 160)
        const t = gate ? fall : hitFall
        ctx.translate(b.w * 0.18 * t, -b.h * 0.04 * t)
        ctx.rotate(Math.PI * 0.52 * t)
      }

      ctx.fillStyle = colors[1]
      ctx.beginPath()
      ctx.moveTo(b.w * 0.22, -b.h * 0.34)
      ctx.quadraticCurveTo(b.w * 0.68, -b.h * 0.44, b.w * 0.48, -b.h * 0.1)
      ctx.quadraticCurveTo(b.w * 0.24, -b.h * 0.19, b.w * 0.08, -b.h * 0.12)
      ctx.fill()

      fillRounded(-b.w * 0.34, -b.h * 0.42, b.w * 0.68, b.h * 0.34, 14, colors[0])

      ctx.fillStyle = colors[2]
      ;[-0.22, -0.04, 0.14].forEach((x) => {
        ctx.beginPath()
        ctx.moveTo(b.w * x, -b.h * 0.43)
        ctx.lineTo(b.w * (x + 0.08), -b.h * 0.57)
        ctx.lineTo(b.w * (x + 0.16), -b.h * 0.43)
        ctx.fill()
      })

      ctx.fillStyle = colors[0]
      ctx.beginPath()
      ctx.ellipse(0, -b.h * 0.62, b.w * 0.45, b.h * 0.32, 0, 0, Math.PI * 2)
      ctx.fill()

      ctx.fillStyle = colors[2]
      ;[0, 1, 2, 3].forEach((i) => {
        const y = -0.74 - i * 0.09
        const size = 0.11 - i * 0.009
        ctx.beginPath()
        ctx.moveTo(0, b.h * (y - size * 1.35))
        ctx.lineTo(-b.w * size, b.h * y)
        ctx.lineTo(b.w * size, b.h * y)
        ctx.closePath()
        ctx.fill()
      })

      ctx.fillStyle = colors[1]
      ctx.beginPath()
      ctx.ellipse(-b.w * 0.13, -b.h * 0.34, b.w * 0.085, b.h * 0.075, 0, 0, Math.PI * 2)
      ctx.ellipse(b.w * 0.16, -b.h * 0.34, b.w * 0.085, b.h * 0.075, 0, 0, Math.PI * 2)
      ctx.fill()

      ctx.fillStyle = '#fff'
      ctx.beginPath()
      ctx.arc(-b.w * 0.14, -b.h * 0.63, b.w * 0.115, 0, Math.PI * 2)
      ctx.arc(b.w * 0.17, -b.h * 0.63, b.w * 0.115, 0, Math.PI * 2)
      ctx.fill()
      ctx.fillStyle = '#101520'
      ctx.beginPath()
      ctx.arc(-b.w * 0.11, -b.h * 0.62, b.w * 0.04, 0, Math.PI * 2)
      ctx.arc(b.w * 0.2, -b.h * 0.62, b.w * 0.04, 0, Math.PI * 2)
      ctx.fill()

      ctx.fillStyle = '#101520'
      ctx.beginPath()
      ctx.ellipse(b.w * 0.02, -b.h * 0.5, b.w * 0.24, b.h * 0.07, 0, 0, Math.PI * 2)
      ctx.fill()
      ctx.fillStyle = '#fff7dd'
      for (let i = 0; i < 5; i += 1) {
        const tx = b.w * (-0.15 + i * 0.075)
        ctx.beginPath()
        ctx.moveTo(tx, -b.h * 0.56)
        ctx.lineTo(tx + b.w * 0.035, -b.h * 0.49)
        ctx.lineTo(tx + b.w * 0.07, -b.h * 0.56)
        ctx.closePath()
        ctx.fill()
      }
      ctx.strokeStyle = '#101520'
      ctx.lineWidth = Math.max(1.2, b.w * 0.035)
      ctx.beginPath()
      ctx.moveTo(-b.w * 0.18, -b.h * 0.56)
      ctx.quadraticCurveTo(0, -b.h * 0.46, b.w * 0.22, -b.h * 0.56)
      ctx.stroke()
      ctx.restore()
      ctx.globalAlpha = 1
      ctx.restore()
    }

    function drawBalls() {
      state.balls.forEach((ball) => {
        ctx.save()
        ;(ball.trail || []).forEach((point, index, trail) => {
          const alpha = (index + 1) / Math.max(1, trail.length)
          ctx.globalAlpha = alpha * 0.36
          ctx.fillStyle = ball.color || '#2e8cff'
          ctx.beginPath()
          ctx.arc(point.x, point.y, ball.r * (0.46 + alpha * 0.28), 0, Math.PI * 2)
          ctx.fill()
        })
        ctx.restore()

        ctx.save()
        ctx.shadowColor = ball.color || '#2e8cff'
        ctx.shadowBlur = 14 * layout().scale
        const glow = ctx.createRadialGradient(ball.x - ball.r * 0.35, ball.y - ball.r * 0.45, 1, ball.x, ball.y, ball.r)
        glow.addColorStop(0, ball.core || '#ffffff')
        glow.addColorStop(0.52, ball.color || '#2e8cff')
        glow.addColorStop(1, '#101722')
        ctx.fillStyle = glow
        ctx.beginPath()
        ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2)
        ctx.fill()
        ctx.shadowBlur = 0
        ctx.strokeStyle = '#06111f'
        ctx.lineWidth = Math.max(1.5, ball.r * 0.22)
        ctx.stroke()
        ctx.restore()
      })
    }

    function drawEffects() {
      state.particles.forEach((particle) => {
        const alpha = Math.max(0, particle.life / particle.max)
        ctx.fillStyle = `rgba(255, 236, 94, ${alpha})`
        ctx.beginPath()
        ctx.arc(particle.x, particle.y, 3 + alpha * 3, 0, Math.PI * 2)
        ctx.fill()
      })

      state.flashes.forEach((flash) => {
        const alpha = Math.max(0, flash.life / flash.max)
        ctx.globalAlpha = alpha
        ctx.fillStyle = flash.color
        ctx.beginPath()
        ctx.arc(flash.x, flash.y, 20 * (1.2 - alpha), 0, Math.PI * 2)
        ctx.fill()
        ctx.globalAlpha = 1
      })
    }

    function draw() {
      drawBackground()
      drawCabinet()
      drawTargetsAboveBelts()
      drawBalls()
      drawEffects()
    }

    function aimAtPoint(x, y) {
      const m = layout()
      const candidates = cannons()
      const nearest = candidates.reduce((best, c) => {
        const score = Math.abs(x - c.centerX) + Math.max(0, y - c.muzzleY) * 0.25
        return !best || score < best.score ? { cannon: c, score } : best
      }, null).cannon
      const dy = Math.max(1, nearest.muzzleY - Math.min(y, nearest.muzzleY - 12 * m.scale))
      const dx = x - nearest.muzzleX
      return {
        index: nearest.index,
        angle: Math.max(-nearest.angleLimit, Math.min(nearest.angleLimit, Math.atan2(dx, dy)))
      }
    }

    function loop(now) {
      const dt = Math.min(0.033, (now - state.lastTime) / 1000)
      state.lastTime = now
      update(dt, now)
      draw()
      requestAnimationFrame(loop)
    }

    function bindInput() {
      window.addEventListener('pointerdown', (event) => {
        if (event.target.closest('.back')) {
          return
        }
        const aim = aimAtPoint(event.clientX, event.clientY)
        if (aim) {
          fire(aim.index, aim.angle)
        }
      })

      window.addEventListener('keydown', (event) => {
        if (event.code === 'Digit1' || event.code === 'Numpad1') {
          event.preventDefault()
          fire(0)
        } else if (event.code === 'Digit2' || event.code === 'Numpad2' || event.code === 'Space' || event.code === 'Enter') {
          event.preventDefault()
          fire(1)
        } else if (event.code === 'Digit3' || event.code === 'Numpad3') {
          event.preventDefault()
          fire(2)
        }
      })
    }

    resize()
    bindInput()
    requestAnimationFrame(loop)
    window.addEventListener('resize', resize)
  </script>
</body>
</html>
